<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Dash</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            touch-action: none;
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .hidden {
            display: none !important;
        }

        #score-display {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #0ff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #0ff;
            z-index: 20;
        }

        #timer-display {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            color: #f00;
            font-size: 40px;
            font-weight: bold;
            text-shadow: 0 0 15px #f00;
            z-index: 20;
        }

        .screen {
            background: rgba(5, 5, 5, 0.85);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #0ff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            text-align: center;
            pointer-events: auto;
        }

        h1 {
            color: #fff;
            font-size: 48px;
            margin: 0 0 20px 0;
            text-shadow: 0 0 15px #f0f, 0 0 30px #f0f;
            letter-spacing: 4px;
        }

        p {
            color: #ccc;
            font-size: 18px;
            margin-bottom: 30px;
        }

        button {
            background: transparent;
            color: #0ff;
            border: 2px solid #0ff;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3) inset;
        }

        button:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 20px #0ff;
            transform: scale(1.05);
        }

        #skinsList {
            touch-action: pan-y;
        }

        #skinsList::-webkit-scrollbar {
            width: 8px;
        }
        #skinsList::-webkit-scrollbar-thumb {
            background: #0ff;
            border-radius: 4px;
        }
        #skinsList::-webkit-scrollbar-track {
            background: rgba(0, 255, 255, 0.1);
            border-radius: 4px;
        }

        #notificationArea {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
            pointer-events: none;
        }

        .notification {
            background: rgba(10, 10, 10, 0.9);
            border: 2px solid #0ff;
            padding: 15px 20px;
            border-radius: 8px;
            color: #fff;
            transform: translateX(150%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: right;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

        .notification.show {
            transform: translateX(0);
        }
    </style>
</head>
<body>

    <div id="score-display">SCORE: <span id="scoreValue">0</span></div>
    <div id="timer-display" class="hidden">67.00</div>
    
    <div id="multiplayer-status" style="position: absolute; top: 10px; right: 10px; color: #ffaa00; font-size: 14px; z-index: 100; text-shadow: 0 0 5px #ffaa00; pointer-events: none;">
        Offline
    </div>

    <div id="peerjs-ui" style="position: absolute; top: 40px; right: 10px; background: rgba(0,0,0,0.8); padding: 15px; border: 2px solid #0ff; border-radius: 10px; color: white; font-family: Courier New; z-index: 100;">
        <h3 style="margin-top: 0; color: #0ff;">Multiplayer</h3>
        <button id="host-btn" style="background: #0ff; color: #000; padding: 5px 10px; border: none; cursor: pointer; font-weight: bold; margin-bottom: 10px;">Host a Game</button>
        <div id="host-info" style="display: none; margin-bottom: 10px;">
            Room ID: <br><span id="room-id-display" style="color: #0f0; font-weight: bold; user-select: all; font-size: 12px; word-break: break-all;">Loading...</span>
        </div>
        <hr style="border-color: #333;">
        <input type="text" id="join-id" placeholder="Enter Room ID" style="padding: 5px; width: 140px; background: #222; color: #0ff; border: 1px solid #0ff; margin-bottom: 5px;">
        <br>
        <button id="join-btn" style="background: #f0f; color: #fff; padding: 5px 10px; border: none; cursor: pointer; font-weight: bold; width: 100%;">Join</button>
    </div>

    <div id="notificationArea"></div>

    <div id="ui-layer">
        <div id="startScreen" class="screen">
            <h1 style="color: #0ff; text-shadow: 0 0 15px #0ff;">NEON DASH</h1>
            <p>Drag or use your mouse to move.<br>Dodge the RED obstacles.<br>Collect GREEN gems for bonus points.</p>
            <div style="display: flex; gap: 20px; justify-content: center;">
                <button id="startBtn">Play Now</button>
                <button id="skinsBtn">Armory</button>
            </div>
        </div>

        <div id="skinsScreen" class="screen hidden" style="width: 450px;">
            <h1 style="color: #0ff; text-shadow: 0 0 15px #0ff; font-size: 36px;">ARMORY</h1>
            <p style="margin-bottom: 15px; font-size: 14px;">Equip a chassis. Every skin has a unique Special Ability.</p>
            <div id="skinsList" style="display: flex; flex-direction: column; gap: 10px; max-height: 400px; overflow-y: auto; margin-bottom: 20px; padding-right: 10px; text-align: left;">
            </div>
            <button id="backToMenuBtn">Back to Menu</button>
        </div>

        <div id="gameOverScreen" class="screen hidden">
            <h1 style="color: #f00; text-shadow: 0 0 15px #f00;" id="gameOverTitle">SYSTEM FAILURE</h1>
            <p>Final Score: <span id="finalScore" style="color:#0ff; font-weight:bold; font-size: 24px;">0</span></p>
            <button id="homeBtn">Return to Base</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script type="module">
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const scoreValue = document.getElementById('scoreValue');
        const finalScore = document.getElementById('finalScore');
        const timerDisplay = document.getElementById('timer-display');
        
        let width, height;
        let gameState = 'start';
        let score = 0;
        let highScore = 0;
        let frameCount = 0;
        let difficultyMultiplier = 1;

        let cutsceneTimer = 0;
        let cutsceneType = '';
        let cutsceneText = '';
        let screenShake = 0;

        let player = { x: 0, y: 0, targetX: 0, targetY: 0, size: 15, color: '#0ff' };
        let obstacles = [];
        let collectibles = [];
        let particles = [];
        let jets = [];
        let missiles = [];

        let nextBossScore = 300; 
        let bossLevel = 1;
        let boss = { active: false, x: 0, y: -100, size: 50, health: 0, maxHealth: 0, speedX: 0, color: '#f0f', state: 'hidden', fireTimer: 0, jetTimer: 0 };
        let bullets = []; 
        let bulletTimer = 0;

        let shipTier = 0;
        let nextUpgradeScore = 1000;
        let upgradeFlashAlpha = 0;
        let mothershipY = -200;
        let postUpgradeInvincTimer = 0;

        // ABILITY VARIABLES
        let magentaShieldActive = false;
        let magentaNextThreshold = 1000;
        let limeCutscenePlayed = false;
        let solarCutscenePlayed = false;
        
        let voidTimer = 360; 
        let voidCutscenePlayed = false;
        let bossDisabledTimer = 0;
        
        let bossKills = 0;
        let glitch67Active = false;
        let glitch67Timer = 0;

        let hasMoved = false;
        let koalaNapActive = false;
        let koalaNapTimer = 0;
        let koalaUsed = false;

        let otherPlayers = {};
        let isHost = false;
        let peer = null;
        let hostConnection = null;
        let clientConnections = []; // For the host to track connected friends

        const statusEl = document.getElementById('multiplayer-status');
        const hostBtn = document.getElementById('host-btn');
        const joinBtn = document.getElementById('join-btn');
        const joinInput = document.getElementById('join-id');
        const hostInfo = document.getElementById('host-info');
        const roomIdDisplay = document.getElementById('room-id-display');

        // Setup PeerJS Networking
        function initPeer() {
            peer = new Peer(); 
            
            peer.on('open', (id) => {
                console.log('Ready! My ID is: ' + id);
            });

            // NEW: Added error checking so it doesn't get stuck!
            peer.on('error', (err) => {
                console.error("PeerJS Error:", err);
                statusEl.innerText = "Connection Failed!";
                statusEl.style.color = "#f00";
                
                if (err.type === 'peer-unavailable') {
                    statusEl.innerText = "Room not found!";
                }
                
                document.getElementById('peerjs-ui').style.display = 'block'; // Show menu again so you can retry
            });

            peer.on('connection', (conn) => {
                if (!isHost) return; // Only the host accepts incoming connections
                
                statusEl.innerText = "Players Joined!";
                statusEl.style.color = "#0f0";
                clientConnections.push(conn);
                
                conn.on('data', (data) => {
                    if (data.type === 'playerUpdate') {
                        otherPlayers[conn.peer] = { ...data.playerData, lastUpdate: Date.now() };
                    }
                });

                conn.on('close', () => {
                    delete otherPlayers[conn.peer];
                    clientConnections = clientConnections.filter(c => c !== conn);
                });
            });
        }

        hostBtn.addEventListener('click', () => {
            if (!peer) initPeer();
            isHost = true;
            hostInfo.style.display = 'block';
            statusEl.innerText = "Hosting Game...";
            statusEl.style.color = "#0ff";
            
            const showId = (id) => {
                roomIdDisplay.innerText = id;
                roomIdDisplay.style.cursor = "pointer";
                roomIdDisplay.title = "Click to copy";
                // Click to copy the ID
                roomIdDisplay.onclick = () => {
                    const tempInput = document.createElement("input");
                    tempInput.value = id;
                    document.body.appendChild(tempInput);
                    tempInput.select();
                    document.execCommand("copy");
                    document.body.removeChild(tempInput);
                    
                    const originalColor = roomIdDisplay.style.color;
                    roomIdDisplay.style.color = "#fff";
                    setTimeout(() => roomIdDisplay.style.color = originalColor, 200);
                };
            };

            if (peer.id) {
                showId(peer.id);
            } else {
                peer.on('open', showId);
            }
        });

        joinBtn.addEventListener('click', () => {
            const roomToJoin = joinInput.value.trim();
            if (!roomToJoin) return;
            
            if (!peer) initPeer();
            isHost = false;
            
            statusEl.innerText = "Connecting...";
            statusEl.style.color = "#ffaa00";

            const connectToHost = () => {
                // NEW: Added 'reliable: true' to make the connection stronger
                hostConnection = peer.connect(roomToJoin, { reliable: true });
                
                hostConnection.on('open', () => {
                    statusEl.innerText = "Connected to Host!";
                    statusEl.style.color = "#0f0";
                    document.getElementById('peerjs-ui').style.display = 'none'; // Hide menu to clean up screen
                });

                hostConnection.on('data', (data) => {
                    if (data.type === 'worldState') {
                        const now = Date.now();
                        for (let id in data.state) {
                            if (id === peer.id) continue; // Don't draw ourselves twice
                            
                            const pData = data.state[id];
                            if (!otherPlayers[id]) {
                                otherPlayers[id] = { ...pData, displayX: pData.x, displayY: pData.y };
                            } else {
                                otherPlayers[id].targetX = pData.x;
                                otherPlayers[id].targetY = pData.y;
                                otherPlayers[id].score = pData.score;
                                otherPlayers[id].skin = pData.skin;
                                otherPlayers[id].lastUpdate = now;
                            }
                        }
                    }
                });

                hostConnection.on('close', () => {
                    statusEl.innerText = "Disconnected";
                    statusEl.style.color = "#f00";
                    otherPlayers = {}; 
                    document.getElementById('peerjs-ui').style.display = 'block'; // Show menu again
                });
            };

            if (peer.id) {
                connectToHost();
            } else {
                peer.on('open', connectToHost);
            }
        });

        // Sync positions rapidly (10 times a second)
        setInterval(() => {
            if (gameState === 'playing') {
                const myData = { x: player.x, y: player.y, skin: equippedSkin, score: Math.floor(score) };
                
                if (isHost) {
                    // Host packages all players (including itself) and sends to everyone
                    let allPlayersData = { ...otherPlayers };
                    allPlayersData[peer.id] = { ...myData, lastUpdate: Date.now() };
                    clientConnections.forEach(c => {
                        if (c.open) c.send({ type: 'worldState', state: allPlayersData });
                    });
                } else if (hostConnection && hostConnection.open) {
                    // Client just sends its own data to the host
                    hostConnection.send({ type: 'playerUpdate', playerData: myData });
                }
            }
        }, 100);

        let alienShields = 0;
        let alienMaxShields = 0;
        let alienNextThreshold = 1000;

        let unlockedSkins = ['cyan'];
        let equippedSkin = 'cyan';
        let recentUnlock = null;
        
        const skins = [
            { id: 'cyan', color: '#0ff', name: 'Classic Cyan', req: 0, desc: 'Reliable. Gets gun upgrades. Tier 5 unlocks Laser.' },
            { id: 'magenta', color: '#f0f', name: 'Neon Magenta', req: 500, desc: 'Purpur Shield: Blocks 1 hit every 1000 pts.' },
            { id: 'lime', color: '#0f0', name: 'Lime Venom', req: 1000, desc: 'Decay Aura: Melts nearby boss projectiles.' },
            { id: 'gold', color: '#ffd700', name: 'Solar Flare', req: 1500, desc: 'Massive bullets, but your hitbox is increased.' },
            { id: 'purple', color: '#8a2be2', name: 'Deep Void', req: 2000, desc: 'Singularity: Fire a massive Black Hole every 6s. Pulls red bricks in.' },
            { id: 'blood', color: '#ff0044', name: 'Blood Moon', req: 2500, desc: 'Rejuvenate: 20% chance to revive (+5% per boss kill).' },
            { id: 'alien', color: '#7fff00', name: 'Alien Invader', req: 3000, desc: 'UFO Shield: Upgrades give shield charges instead of guns. +1 Charge/1000pts.' },
            { id: 'koala', color: '#a9a9a9', name: 'KOALASEATME', req: -1, desc: 'Take a nap: Fatal damage freezes movement & grants 100s invincibility (Once per run).' },
            { id: 'secret67', color: '#ff3300', name: 'Glitch 67', req: -1, desc: 'Anomaly: Die at boss? 67s invincible to kill & revive.' }
        ];

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            if (gameState === 'start') {
                player.x = width / 2;
                player.y = height / 1.5;
                player.targetX = player.x;
                player.targetY = player.y;
            }
        }
        window.addEventListener('resize', resize);
        resize();

        function getDist(p1, p2) {
            const dx = p1.x - p2.x;
            const dy = p1.y - p2.y;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function updateTarget(e) {
            if (gameState !== 'playing' && !(gameState === 'cutscene' && (cutsceneType === 'boss_defeat' || cutsceneType === 'skin_unlock' || cutsceneType === 'magenta_block' || cutsceneType === 'lime_decay' || cutsceneType === 'void_shot' || cutsceneType === 'solar_power' || cutsceneType === 'alien_shield' || cutsceneType === 'koala_wake'))) return;
            if (koalaNapActive) return; // Prevent movement targeting while sleeping
            
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            player.targetX = clientX;
            player.targetY = clientY;
        }

        window.addEventListener('mousemove', updateTarget);
        window.addEventListener('touchmove', updateTarget, {passive: false});
        
        document.addEventListener('touchmove', function(e) { 
            if (e.target.closest('#skinsList')) return;
            e.preventDefault(); 
        }, { passive: false });

        document.getElementById('startBtn').addEventListener('click', startGame);
        
        document.getElementById('homeBtn').addEventListener('click', () => {
            gameOverScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
            gameState = 'start';
            scoreValue.innerText = '0';
            document.getElementById('gameOverTitle').innerText = 'SYSTEM FAILURE';
            
            player.x = width / 2;
            player.y = height / 1.5;
            player.targetX = player.x;
            player.targetY = player.y;
        });
        
        document.getElementById('skinsBtn').addEventListener('click', () => {
            startScreen.classList.add('hidden');
            document.getElementById('skinsScreen').classList.remove('hidden');
            renderSkins();
        });

        document.getElementById('backToMenuBtn').addEventListener('click', () => {
            document.getElementById('skinsScreen').classList.add('hidden');
            startScreen.classList.remove('hidden');
        });

        function renderSkins() {
            const list = document.getElementById('skinsList');
            list.innerHTML = '';
            skins.forEach(s => {
                const isUnlocked = unlockedSkins.includes(s.id);
                const isEquipped = equippedSkin === s.id;
                
                const div = document.createElement('div');
                div.style.padding = '10px';
                div.style.border = `2px solid ${isUnlocked ? s.color : '#333'}`;
                div.style.borderRadius = '5px';
                div.style.display = 'flex';
                div.style.justifyContent = 'space-between';
                div.style.alignItems = 'center';
                div.style.backgroundColor = 'rgba(0,0,0,0.5)';
                
                let btnHtml = '';
                if (isUnlocked) {
                    if (isEquipped) {
                        btnHtml = `<button disabled style="padding: 5px 10px; font-size: 14px; border-color: #555; color: #555; box-shadow: none; cursor: default;">Equipped</button>`;
                    } else {
                        btnHtml = `<button onclick="equipSkin('${s.id}')" style="padding: 5px 10px; font-size: 14px; border-color: ${s.color}; color: ${s.color}; text-shadow: 0 0 5px ${s.color};">Equip</button>`;
                    }
                } else {
                    btnHtml = `<span style="font-size: 14px; color: #555; font-weight: bold;">LOCKED</span>`;
                }

                div.innerHTML = `
                    <div style="flex-grow: 1; padding-right: 10px;">
                        <div style="font-weight: bold; font-size: 16px; color: ${isUnlocked ? s.color : '#555'}; text-shadow: 0 0 5px ${isUnlocked ? s.color : 'transparent'};">
                            ${isUnlocked || s.req !== -1 ? s.name : '???'}
                        </div>
                        <div style="font-size: 11px; color: ${isUnlocked ? '#ccc' : '#444'}; margin-top: 4px; line-height: 1.2;">
                            ${isUnlocked && s.req === -1 ? `Secret Unlocked: ${s.desc}` : s.desc}
                        </div>
                    </div>
                    <div>${btnHtml}</div>
                `;
                list.appendChild(div);
            });
        }

        window.equipSkin = function(id) {
            equippedSkin = id;
            player.color = skins.find(s => s.id === id).color;
            renderSkins();
        };

        function showNotification(title, message, color) {
            const notifArea = document.getElementById('notificationArea');
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.style.borderColor = color;
            notif.style.boxShadow = `0 0 15px ${color}`;
            notif.innerHTML = `<strong style="color:${color}; font-size: 18px;">${title}</strong><br><span style="color:#ccc; font-size: 14px;">${message}</span>`;
            
            notifArea.appendChild(notif);
            setTimeout(() => notif.classList.add('show'), 10);
            setTimeout(() => {
                notif.classList.remove('show');
                setTimeout(() => notif.remove(), 500);
            }, 4000);
        }

        function startGame() {
            gameState = 'playing';
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            timerDisplay.classList.add('hidden');
            score = 0;
            frameCount = 0;
            difficultyMultiplier = 1;
            obstacles = [];
            collectibles = [];
            particles = [];
            bullets = [];
            jets = [];
            missiles = [];
            
            nextBossScore = 300;
            bossLevel = 1;
            boss.active = false;
            boss.state = 'hidden';
            bossDisabledTimer = 0;
            
            shipTier = 0;
            nextUpgradeScore = 1000;
            upgradeFlashAlpha = 0;
            mothershipY = -200;
            postUpgradeInvincTimer = 0;

            // Reset Abilities
            magentaShieldActive = false;
            magentaNextThreshold = 1000;
            
            alienMaxShields = (equippedSkin === 'alien') ? 1 : 0;
            alienShields = alienMaxShields;
            alienNextThreshold = 1000;

            limeCutscenePlayed = false;
            solarCutscenePlayed = false;
            voidTimer = 360; 
            voidCutscenePlayed = false;
            bossKills = 0;
            glitch67Active = false;
            glitch67Timer = 0;

            hasMoved = false;
            koalaNapActive = false;
            koalaNapTimer = 0;
            koalaUsed = false;

            player.size = (equippedSkin === 'gold') ? 25 : 15; 
            
            gameState = 'cutscene';
            cutsceneType = 'intro';
            cutsceneTimer = 90;
            cutsceneText = 'SYSTEM START';
            
            player.color = skins.find(s => s.id === equippedSkin).color;
            player.x = width / 2;
            player.y = height + 50; 
            player.targetX = width / 2;
            player.targetY = height / 1.5;
            
            updateScore(0);
        }

        function checkBossDeath() {
            if (boss.health <= 0 && boss.active) {
                if (glitch67Active) {
                    glitch67Active = false;
                    timerDisplay.classList.add('hidden');
                    gameState = 'cutscene';
                    cutsceneType = 'glitch_success';
                    cutsceneTimer = 120;
                    cutsceneText = 'ANOMALY SURVIVED - REVIVING';
                    bossKills++;
                } else {
                    gameState = 'cutscene';
                    cutsceneType = 'boss_defeat';
                    cutsceneTimer = 120;
                    cutsceneText = 'TARGET DESTROYED';
                }
            }
        }

        function handlePlayerHit() {
            if (glitch67Active) return; 
            if (postUpgradeInvincTimer > 0) return;
            if (koalaNapActive) return; // FIX: Actually grants the 100s invincibility during the nap

            // ALIEN UFO SHIELD
            if (equippedSkin === 'alien' && alienShields > 0) {
                alienShields--;
                postUpgradeInvincTimer = 60; // 1 second invinc
                createExplosion(player.x, player.y, '#7fff00', 40);
                screenShake = 15;
                showNotification('UFO SHIELD', `${alienShields} charges remaining`, '#7fff00');
                
                obstacles = obstacles.filter(o => { if(getDist(player, o) < 150) { createExplosion(o.x, o.y, '#7fff00', 3); return false; } return true; });
                missiles = missiles.filter(m => { if(getDist(player, m) < 150) { createExplosion(m.x, m.y, '#7fff00', 3); return false; } return true; });
                
                gameState = 'cutscene';
                cutsceneType = 'alien_shield';
                cutsceneTimer = 60;
                cutsceneText = 'UFO SHIELD DEPLOYED';
                return;
            }

            // KOALA NAP ABILITY
            if (equippedSkin === 'koala' && !koalaUsed) {
                koalaUsed = true;
                koalaNapActive = true;
                koalaNapTimer = 100 * 60; // 100 seconds
                gameState = 'cutscene';
                cutsceneType = 'koala_nap';
                cutsceneTimer = 60;
                cutsceneText = 'TAKING A NAP...';
                createExplosion(player.x, player.y, '#a9a9a9', 50);
                timerDisplay.classList.remove('hidden');
                screenShake = 10;
                obstacles = []; missiles = []; jets = []; bullets = [];
                return;
            }

            // MAGENTA PURPUR SHIELD
            if (equippedSkin === 'magenta' && magentaShieldActive) {
                magentaShieldActive = false;
                gameState = 'cutscene';
                cutsceneType = 'magenta_block';
                cutsceneTimer = 60;
                cutsceneText = 'PURPUR SHIELD DEPLOYED';
                
                obstacles = obstacles.filter(o => { if (getDist(player, o) < 200) { createExplosion(o.x, o.y, '#f0f', 5); return false; } return true; });
                missiles = missiles.filter(m => { if (getDist(player, m) < 200) { createExplosion(m.x, m.y, '#f0f', 5); return false; } return true; });
                createExplosion(player.x, player.y, '#f0f', 80);
                screenShake = 15;
                return;
            }

            // GLITCH 67 OVERRIDE
            if (equippedSkin === 'secret67' && boss.active && !glitch67Active) {
                glitch67Active = true;
                glitch67Timer = 67 * 60; 
                gameState = 'cutscene';
                cutsceneType = 'glitch_start';
                cutsceneTimer = 90;
                cutsceneText = '67 SECONDS TO SURVIVE';
                createExplosion(player.x, player.y, '#ff3300', 50);
                timerDisplay.classList.remove('hidden');
                screenShake = 10;
                return;
            }

            // BLOOD MOON REVIVE
            if (equippedSkin === 'blood') {
                let reviveChance = 0.20 + (bossKills * 0.05);
                if (Math.random() < reviveChance) {
                    gameState = 'cutscene';
                    cutsceneType = 'blood_revive';
                    cutsceneTimer = 90;
                    cutsceneText = 'BLOOD MOON RISES';
                    
                    obstacles = []; missiles = []; jets = []; bullets = []; bossDisabledTimer = 60;
                    player.x = width / 2; player.y = height / 1.5;
                    player.targetX = width / 2; player.targetY = height / 1.5;
                    createExplosion(player.x, player.y, '#ff0044', 150);
                    screenShake = 20;
                    return;
                }
            }

            gameOver();
        }

        function gameOver() {
            if (gameState === 'cutscene') return; 
            timerDisplay.classList.add('hidden');
            gameState = 'cutscene';
            cutsceneType = 'player_death';
            cutsceneTimer = 90; 
            cutsceneText = 'SYSTEM FAILURE';
        }

        function updateScore(points) {
            score += points;
            const currentIntScore = Math.floor(score);
            scoreValue.innerText = currentIntScore;
            
            if (currentIntScore > highScore) highScore = currentIntScore;
            
            if (equippedSkin === 'magenta' && currentIntScore >= magentaNextThreshold && !magentaShieldActive) {
                magentaShieldActive = true;
                magentaNextThreshold += 1000;
                showNotification('ABILITY READY', 'Purpur Shield Online', '#f0f');
                createExplosion(player.x, player.y, '#f0f', 20);
            }

            if (equippedSkin === 'alien' && currentIntScore >= alienNextThreshold) {
                alienNextThreshold += 1000;
                if (alienShields < alienMaxShields) {
                    alienShields++;
                    showNotification('SHIELD RECHARGED', `Charges: ${alienShields}/${alienMaxShields}`, '#7fff00');
                    createExplosion(player.x, player.y, '#7fff00', 15);
                }
            }

            let unlockedAny = false;
            skins.forEach(s => {
                if (s.req > 0 && highScore >= s.req && !unlockedSkins.includes(s.id)) {
                    unlockedSkins.push(s.id);
                    recentUnlock = s;
                    unlockedAny = true;
                }
            });

            if (unlockedAny && gameState === 'playing') {
                gameState = 'cutscene';
                cutsceneType = 'skin_unlock';
                cutsceneTimer = 100;
                cutsceneText = 'ARMORY UNLOCKED';
            }
        }

        function spawnObstacle() {
            const size = Math.random() * 20 + 15;
            obstacles.push({
                x: Math.random() * width,
                y: -size,
                size: size,
                speedY: (Math.random() * 3 + 2),
                speedX: (Math.random() - 0.5) * 2,
                color: '#f00',
                rotation: 0,
                rotationSpeed: (Math.random() - 0.5) * 0.2
            });
        }

        function spawnCollectible() {
            collectibles.push({
                x: Math.random() * (width - 40) + 20,
                y: -20,
                size: 12,
                speedY: (Math.random() * 2 + 1),
                color: '#0f0',
                pulse: 0
            });
        }

        function spawnBullet() {
            const bColor = player.color;
            const bText = equippedSkin === 'secret67' ? '67' : null;
            let sizeMult = equippedSkin === 'gold' ? 3 : 1; 
            
            bullets.push({ x: player.x, y: player.y - player.size, size: 5 * sizeMult, speedY: -12, speedX: 0, color: bColor, text: bText });
            
            // Alien skin replaces weapon upgrades with shields, so it ONLY shoots 1 bullet stream
            if (equippedSkin === 'alien') return;

            if (shipTier >= 1) { 
                bullets.push({ x: player.x - 12, y: player.y - player.size + 5, size: 4 * sizeMult, speedY: -12, speedX: 0, color: bColor, text: bText });
                bullets.push({ x: player.x + 12, y: player.y - player.size + 5, size: 4 * sizeMult, speedY: -12, speedX: 0, color: bColor, text: bText });
            }
            if (shipTier >= 2) { 
                bullets.push({ x: player.x - 20, y: player.y, size: 4 * sizeMult, speedY: -10, speedX: -3, color: bColor, text: bText });
                bullets.push({ x: player.x + 20, y: player.y, size: 4 * sizeMult, speedY: -10, speedX: 3, color: bColor, text: bText });
            }
            if (shipTier >= 3) { 
                bullets.push({ x: player.x - 30, y: player.y + 10, size: 4 * sizeMult, speedY: -8, speedX: -6, color: bColor, text: bText });
                bullets.push({ x: player.x + 30, y: player.y + 10, size: 4 * sizeMult, speedY: -8, speedX: 6, color: bColor, text: bText });
            }
            if (shipTier >= 4) { 
                bullets.push({ x: player.x - 40, y: player.y + 20, size: 4 * sizeMult, speedY: -6, speedX: -9, color: bColor, text: bText });
                bullets.push({ x: player.x + 40, y: player.y + 20, size: 4 * sizeMult, speedY: -6, speedX: 9, color: bColor, text: bText });
            }
        }

        function spawnBlackHole() {
            const bhSize = 35 + (shipTier * 5); 
            bullets.push({ x: player.x, y: player.y - player.size, size: bhSize, speedY: -3, speedX: 0, color: '#8a2be2', isBlackHole: true, hasHitBoss: false });
            
            if (!voidCutscenePlayed) {
                voidCutscenePlayed = true;
                gameState = 'cutscene';
                cutsceneType = 'void_shot';
                cutsceneTimer = 60;
                cutsceneText = 'SINGULARITY DEPLOYED';
                screenShake = 5;
            }
        }

        function spawnBossProjectile() {
            const dx = player.x - boss.x;
            const dy = player.y - boss.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const speed = 4 + bossLevel;
            
            obstacles.push({ x: boss.x, y: boss.y, size: 15, speedY: (dy / dist) * speed, speedX: (dx / dist) * speed, color: '#f0f', rotation: 0, rotationSpeed: 0.2 });
        }

        function spawnJet() {
            const side = Math.random() > 0.5 ? 1 : -1;
            jets.push({
                x: side === 1 ? -20 : width + 20,
                y: boss.y + (Math.random() * 80 + 40),
                size: 18,
                speedX: side === 1 ? 3 + (bossLevel * 0.5) : -3 - (bossLevel * 0.5),
                health: 30 + (bossLevel * 10),
                color: '#f80',
                fireTimer: Math.random() * 40
            });
        }

        function spawnMissile(sourceX, sourceY) {
            missiles.push({ x: sourceX, y: sourceY, size: 4, vx: 0, vy: 4, speed: 4 + (bossLevel * 0.5), color: '#f40', life: 150 });
        }

        function createExplosion(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                    size: Math.random() * 4 + 2, color: color,
                    life: 1.0, decay: Math.random() * 0.02 + 0.015
                });
            }
        }

        function update() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.life -= p.decay;
                if (p.life <= 0) particles.splice(i, 1);
            }

            if (gameState === 'start') return;

            if (gameState === 'gameover') {
                if (boss.active) boss.y -= 1; 
                for (let i = bullets.length - 1; i >= 0; i--) {
                    let b = bullets[i]; b.y += b.speedY; b.x += b.speedX || 0;
                    if (b.y < -100 || b.y > height + 100 || b.x < -100 || b.x > width + 100) bullets.splice(i, 1);
                }
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    let obs = obstacles[i]; obs.y += obs.speedY; obs.x += obs.speedX; obs.rotation += obs.rotationSpeed;
                    if (obs.y > height + obs.size || obs.x < -obs.size || obs.x > width + obs.size) obstacles.splice(i, 1);
                }
                for (let i = missiles.length - 1; i >= 0; i--) {
                    let m = missiles[i]; m.x += m.vx; m.y += m.vy;
                    if (m.y > height + 50 || m.x < -50 || m.x > width + 50 || m.y < -50) missiles.splice(i, 1);
                }
                for (let i = jets.length - 1; i >= 0; i--) {
                    let j = jets[i]; j.x += j.speedX;
                    if (j.x < -100 || j.x > width + 100) jets.splice(i, 1);
                }
                for (let i = collectibles.length - 1; i >= 0; i--) {
                    let col = collectibles[i]; col.y += col.speedY; col.pulse += 0.1;
                    if (col.y > height + col.size) collectibles.splice(i, 1);
                }
                return;
            }

            if (postUpgradeInvincTimer > 0) postUpgradeInvincTimer--;
            if (bossDisabledTimer > 0) bossDisabledTimer--;

            // CUTSCENE LOGIC UPDATES
            if (gameState === 'cutscene') {
                frameCount++;
                cutsceneTimer--;
                
                if (['magenta_block', 'lime_decay', 'void_shot', 'solar_power', 'alien_shield', 'koala_nap', 'koala_wake'].includes(cutsceneType)) {
                    const ease = 0.15;
                    if (!koalaNapActive) { // Don't move if napping
                        player.x += (player.targetX - player.x) * ease;
                        player.y += (player.targetY - player.y) * ease;
                    }
                    if (cutsceneTimer <= 0) gameState = 'playing';
                    for (let i = bullets.length - 1; i >= 0; i--) {
                        let b = bullets[i]; b.y += b.speedY; b.x += b.speedX || 0;
                    }
                    return;
                }

                if (cutsceneType === 'intro') {
                    player.y += (player.targetY - player.y) * 0.05;
                    if (cutsceneTimer <= 0) gameState = 'playing';
                } else if (cutsceneType === 'skin_unlock' || cutsceneType === 'glitch_success' || cutsceneType === 'blood_revive') {
                    const ease = 0.15;
                    player.x += (player.targetX - player.x) * ease;
                    player.y += (player.targetY - player.y) * ease;
                    
                    if (cutsceneTimer % 5 === 0 && recentUnlock && cutsceneType === 'skin_unlock') {
                        createExplosion(player.x, player.y, recentUnlock.color, 3);
                    }
                    if (cutsceneTimer <= 0) {
                        gameState = 'playing';
                        if (cutsceneType === 'skin_unlock') showNotification('SKIN UNLOCKED', recentUnlock.name, recentUnlock.color);
                    }
                } else if (cutsceneType === 'glitch_start') {
                    if (cutsceneTimer <= 0) gameState = 'playing';
                } else if (cutsceneType === 'boss_defeat') {
                    const ease = 0.15;
                    player.x += (player.targetX - player.x) * ease;
                    player.y += (player.targetY - player.y) * ease;

                    if (cutsceneTimer % 5 === 0) {
                        createExplosion(boss.x + (Math.random() - 0.5) * boss.size * 2, boss.y + (Math.random() - 0.5) * boss.size * 2, '#ff0', 5);
                        createExplosion(boss.x + (Math.random() - 0.5) * boss.size * 2, boss.y + (Math.random() - 0.5) * boss.size * 2, boss.color, 5);
                    }
                    screenShake = 8;

                    if (cutsceneTimer <= 0) {
                        createExplosion(boss.x, boss.y, boss.color, 150);
                        boss.active = false;
                        bossKills++;
                        updateScore(500 * bossLevel);
                        nextBossScore = score + 500 * bossLevel + 300;
                        bossLevel++;
                        gameState = 'playing';
                        screenShake = 0;
                    }
                } else if (cutsceneType === 'player_death') {
                    screenShake = 10;
                    if (cutsceneTimer % 3 === 0) {
                        const angle = Math.random() * Math.PI * 2;
                        const dist = Math.max(width, height) * 0.8;
                        obstacles.push({
                            x: player.x + Math.cos(angle) * dist, y: player.y + Math.sin(angle) * dist,
                            size: 10, speedX: -Math.cos(angle) * 20, speedY: -Math.sin(angle) * 20,
                            color: '#f00', rotation: 0, rotationSpeed: 0
                        });
                    }

                    for (let i = obstacles.length - 1; i >= 0; i--) {
                        let obs = obstacles[i];
                        obs.x += obs.speedX; obs.y += obs.speedY; obs.rotation += obs.rotationSpeed;
                        if (getDist(player, obs) < player.size + (obs.size * 0.8)) {
                            createExplosion(player.x, player.y, '#f00', 8);
                            obstacles.splice(i, 1);
                        }
                    }

                    if (cutsceneTimer <= 0) {
                        const finalIntScore = Math.floor(score);
                        if (!hasMoved && !unlockedSkins.includes('koala')) {
                            unlockedSkins.push('koala');
                            recentUnlock = skins.find(s => s.id === 'koala');
                            gameState = 'cutscene';
                            cutsceneType = 'koala_unlock';
                            cutsceneTimer = 180;
                            cutsceneText = 'LAZINESS REWARDED';
                            createExplosion(player.x, player.y, '#a9a9a9', 100); 
                        } else if (finalIntScore === 67 && !unlockedSkins.includes('secret67')) {
                            unlockedSkins.push('secret67');
                            recentUnlock = skins.find(s => s.id === 'secret67');
                            gameState = 'cutscene';
                            cutsceneType = 'secret_unlock';
                            cutsceneTimer = 180;
                            cutsceneText = 'ANOMALY DETECTED';
                            createExplosion(player.x, player.y, '#ff3300', 100); 
                        } else {
                            createExplosion(player.x, player.y, player.color, 100);
                            gameState = 'gameover';
                            gameOverScreen.classList.remove('hidden');
                            finalScore.innerText = finalIntScore;
                            screenShake = 0;
                        }
                    }
                } else if (cutsceneType === 'secret_unlock') {
                    screenShake = 5;
                    if (cutsceneTimer === 120) cutsceneText = 'SYSTEM OVERRIDE';
                    if (cutsceneTimer === 60) cutsceneText = 'GLITCH 67 ACQUIRED';
                    if (cutsceneTimer % 2 === 0) {
                        createExplosion(Math.random() * width, Math.random() * height, '#ff3300', 1);
                        createExplosion(Math.random() * width, Math.random() * height, '#fff', 1);
                    }
                    if (cutsceneTimer <= 0) {
                        gameState = 'gameover';
                        gameOverScreen.classList.remove('hidden');
                        document.getElementById('gameOverTitle').innerText = 'ANOMALY SURVIVED';
                        finalScore.innerText = Math.floor(score);
                        screenShake = 0;
                        showNotification('SECRET UNLOCKED', 'Glitch 67', '#ff3300');
                    }
                } else if (cutsceneType === 'koala_unlock') {
                    screenShake = 5;
                    if (cutsceneTimer === 120) cutsceneText = 'A LAZY ONE, ARENT YOU?';
                    if (cutsceneTimer === 60) cutsceneText = 'KOALASEATME ACQUIRED';
                    if (cutsceneTimer % 2 === 0) {
                        createExplosion(Math.random() * width, Math.random() * height, '#a9a9a9', 1);
                        createExplosion(Math.random() * width, Math.random() * height, '#fff', 1);
                    }
                    if (cutsceneTimer <= 0) {
                        gameState = 'gameover';
                        gameOverScreen.classList.remove('hidden');
                        document.getElementById('gameOverTitle').innerText = 'NAP TIME OVER';
                        finalScore.innerText = Math.floor(score);
                        screenShake = 0;
                        showNotification('SECRET UNLOCKED', 'KOALASEATME', '#a9a9a9');
                    }
                } else if (cutsceneType === 'upgrade') {
                    const ease = 0.1;
                    player.x += (player.targetX - player.x) * ease;
                    player.y += (player.targetY - player.y) * ease;
                    
                    if (cutsceneTimer > 180) {
                        mothershipY += (100 - mothershipY) * 0.05;
                    } else if (cutsceneTimer > 120) {
                        if (cutsceneTimer % 4 === 0) createExplosion(player.x + (Math.random() - 0.5) * 20, player.y - 10, '#0ff', 2);
                    } else if (cutsceneTimer > 80) {
                        upgradeFlashAlpha = 1 - ((cutsceneTimer - 80) / 40);
                        if (cutsceneTimer === 81) {
                            shipTier++;
                            nextUpgradeScore += 1000;
                            
                            if (equippedSkin === 'alien') {
                                alienMaxShields = shipTier + 1;
                                alienShields = alienMaxShields;
                            }
                            
                            createExplosion(player.x, player.y, '#fff', 150);
                            if (equippedSkin === 'alien') {
                                cutsceneText = 'UFO SHIELDS MAXIMIZED';
                            } else if (shipTier === 5 && equippedSkin !== 'purple') {
                                cutsceneText = 'LASER BEAM ONLINE';
                            } else {
                                cutsceneText = 'SHIP UPGRADED';
                            }
                        }
                    } else if (cutsceneTimer > 40) {
                        upgradeFlashAlpha = (cutsceneTimer - 40) / 40;
                    } else {
                        mothershipY += (-300 - mothershipY) * 0.05;
                        cutsceneText = '';
                    }
                    if (cutsceneTimer <= 0) {
                        gameState = 'playing';
                        postUpgradeInvincTimer = 180; // 3 SECONDS INVINCIBILITY
                    }
                }
                return;
            }

            if (equippedSkin === 'gold' && !solarCutscenePlayed) {
                solarCutscenePlayed = true;
                gameState = 'cutscene';
                cutsceneType = 'solar_power';
                cutsceneTimer = 80;
                cutsceneText = 'SOLAR FLARE ACTIVE';
                return;
            }

            if (glitch67Active) {
                glitch67Timer--;
                timerDisplay.innerText = (glitch67Timer / 60).toFixed(2);
                if (glitch67Timer <= 0) {
                    glitch67Active = false;
                    gameOver();
                }
            }

            if (koalaNapActive) {
                koalaNapTimer--;
                timerDisplay.innerText = (koalaNapTimer / 60).toFixed(2);
                player.targetX = player.x; // Force position
                player.targetY = player.y;
                if (koalaNapTimer <= 0) {
                    koalaNapActive = false;
                    timerDisplay.classList.add('hidden');
                    gameState = 'cutscene';
                    cutsceneType = 'koala_wake';
                    cutsceneTimer = 60;
                    cutsceneText = 'WIDE AWAKE';
                    postUpgradeInvincTimer = 180; // Waking up gives 3s invincibility
                }
            }

            if (!hasMoved && gameState === 'playing' && getDist(player, {x: width/2, y: height/1.5}) > 10) {
                hasMoved = true;
            }

            // Animate other players smoothly
            const now = Date.now();
            for (let id in otherPlayers) {
                let p = otherPlayers[id];
                if (now - p.lastUpdate > 10000) {
                    delete otherPlayers[id];
                    continue;
                }
                if (p.targetX !== undefined) {
                    p.displayX += (p.targetX - p.displayX) * 0.15;
                    p.displayY += (p.targetY - p.displayY) * 0.15;
                }
            }

            frameCount++;
            difficultyMultiplier = 1 + (frameCount / 2000);

            const ease = 0.15;
            player.x += (player.targetX - player.x) * ease;
            player.y += (player.targetY - player.y) * ease;
            player.x = Math.max(player.size, Math.min(width - player.size, player.x));
            player.y = Math.max(player.size, Math.min(height - player.size, player.y));

            // TIER 5 LASER DAMAGE LOGIC (Runs every frame)
            if (shipTier >= 5 && equippedSkin !== 'alien' && equippedSkin !== 'purple') {
                const lx = player.x - 15;
                const lw = 30;
                const ly = 0;

                if (frameCount % 2 === 0) createExplosion(player.x + (Math.random()-0.5)*30, player.y - Math.random()*height, player.color, 1);

                if (boss.active && boss.state !== 'entering') {
                    if (boss.x + boss.size > lx && boss.x - boss.size < lx + lw && boss.y > ly && boss.y - boss.size < player.y) {
                        boss.health -= 8; // Continuous laser burn
                        createExplosion(boss.x + (Math.random()-0.5)*boss.size, boss.y + boss.size, '#ff0', 2);
                        checkBossDeath();
                    }
                }
                
                for (let i = jets.length - 1; i >= 0; i--) {
                    let j = jets[i];
                    if (j.x + j.size > lx && j.x - j.size < lx + lw) {
                        j.health -= 8;
                        createExplosion(j.x, j.y, '#ff0', 2);
                        if (j.health <= 0) {
                            createExplosion(j.x, j.y, j.color, 20);
                            updateScore(50);
                            jets.splice(i, 1);
                        }
                    }
                }
                
                for (let i = missiles.length - 1; i >= 0; i--) {
                    let m = missiles[i];
                    if (m.x + m.size > lx && m.x - m.size < lx + lw) {
                        createExplosion(m.x, m.y, m.color, 15); 
                        missiles.splice(i, 1);
                    }
                }
            }

            if (equippedSkin === 'lime' && boss.active) {
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    let obs = obstacles[i];
                    if (obs.color === '#f0f' && getDist(player, obs) < 220) {
                        obs.size -= 0.6; 
                        createExplosion(obs.x, obs.y, '#0f0', 1); 
                        if (obs.size < 3) {
                            obstacles.splice(i, 1);
                            createExplosion(obs.x, obs.y, '#0f0', 10);
                            if (!limeCutscenePlayed) {
                                limeCutscenePlayed = true;
                                gameState = 'cutscene';
                                cutsceneType = 'lime_decay';
                                cutsceneTimer = 70;
                                cutsceneText = 'DECAY AURA ENGAGED';
                            }
                        }
                    }
                }
            }

            let spawnRate = Math.max(10, Math.floor(40 - (difficultyMultiplier * 5)));
            
            if (!boss.active) {
                if (frameCount % spawnRate === 0) spawnObstacle();
                if (frameCount % 150 === 0) spawnCollectible();
                
                if (score >= nextUpgradeScore) {
                    gameState = 'cutscene';
                    cutsceneType = 'upgrade';
                    cutsceneTimer = 250; 
                    cutsceneText = 'MOTHERSHIP INBOUND';
                    player.targetX = width / 2; player.targetY = height / 1.5;
                    mothershipY = -200; upgradeFlashAlpha = 0;
                }
                else if (score >= nextBossScore) {
                    boss.active = true; boss.state = 'entering';
                    boss.x = width / 2; boss.y = -100;
                    boss.maxHealth = 400 * bossLevel; boss.health = boss.maxHealth;
                    boss.speedX = 5 + bossLevel; boss.fireTimer = 0; boss.jetTimer = 0;                
                }
            } else {
                if (boss.state === 'entering') {
                    boss.y += 2;
                    if (boss.y >= 100) boss.state = 'fighting';
                } else if (boss.state === 'fighting') {
                    
                    if (bossDisabledTimer > 0) {
                        // Boss is stunned! Shakes slightly but can't shoot or move much.
                        boss.x += (Math.random() - 0.5) * 5;
                    } else {
                        boss.x += boss.speedX;
                        if (boss.x <= boss.size || boss.x >= width - boss.size) boss.speedX *= -1;
                        
                        boss.fireTimer++;
                        let bossFireRate = Math.max(10, 40 - (bossLevel * 5)); 
                        if (boss.fireTimer >= bossFireRate) {
                            spawnBossProjectile();
                            boss.fireTimer = 0;
                        }

                        boss.jetTimer++;
                        let jetSpawnRate = Math.max(60, 150 - (bossLevel * 10));
                        if (boss.jetTimer >= jetSpawnRate) {
                            spawnJet();
                            boss.jetTimer = 0;
                        }
                    }
                }
                
                if (equippedSkin === 'purple') {
                    voidTimer++;
                    if (voidTimer >= 360) { // 6 Seconds
                        spawnBlackHole();
                        voidTimer = 0;
                    }
                } else if (shipTier < 5 || equippedSkin === 'alien') {
                    bulletTimer++;
                    if (bulletTimer >= 8) {
                        spawnBullet();
                        bulletTimer = 0;
                    }
                }
            }

            if (!boss.active && frameCount % 10 === 0) updateScore(1 * difficultyMultiplier);

            // BULLETS UPDATE
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.y += b.speedY; b.x += b.speedX || 0;
                
                if (boss.active && boss.state !== 'entering') {
                    
                    // DEEP VOID GRAVITY SUCK ON BOSS
                    if (b.isBlackHole) {
                        const dx = b.x - boss.x;
                        const dy = b.y - boss.y;
                        boss.x += dx * 0.05;
                        boss.y += dy * 0.05;
                    }

                    const dist = getDist(b, boss);
                    if (dist < boss.size * 0.8 + b.size) {
                        if (b.isBlackHole) {
                            if (!b.hasHitBoss) {
                                b.hasHitBoss = true;
                                boss.health -= boss.maxHealth * 0.25; // 25% CHUNK!
                                bossDisabledTimer = 180; // DISABLE ABILITIES 3s
                                
                                createExplosion(boss.x, boss.y, '#8a2be2', 100);
                                showNotification('VOID BURST', 'Boss Systems Disabled', '#8a2be2');
                                screenShake = 15;
                                
                                // Wipe Jets & Missiles
                                for(let j = 0; j < jets.length; j++) createExplosion(jets[j].x, jets[j].y, jets[j].color, 20);
                                jets = [];
                                for(let m = 0; m < missiles.length; m++) createExplosion(missiles[m].x, missiles[m].y, missiles[m].color, 10);
                                missiles = [];
                            } else {
                                boss.health -= 2; // minor tick damage if it lingers
                            }
                        } else {
                            boss.health -= 10;
                            bullets.splice(i, 1);
                        }
                        
                        createExplosion(b.x, b.y - b.size, b.color, b.isBlackHole ? 2 : 3);
                        checkBossDeath();
                        continue;
                    }
                }
                if (b.y < -100) bullets.splice(i, 1);
            }

            // JETS UPDATE
            for (let i = jets.length - 1; i >= 0; i--) {
                let j = jets[i];
                j.x += j.speedX; j.y += Math.sin(frameCount * 0.05) * 1.5;

                j.fireTimer++;
                if (j.fireTimer > 80) { spawnMissile(j.x, j.y); j.fireTimer = 0; }

                let jetHit = false;
                for (let k = bullets.length - 1; k >= 0; k--) {
                    let b = bullets[k];
                    if (getDist(b, j) < j.size + b.size) {
                        j.health -= b.isBlackHole ? 4 : 10;
                        createExplosion(b.x, b.y, '#ff0', 3);
                        if (!b.isBlackHole) bullets.splice(k, 1);
                        jetHit = true;
                        if (j.health <= 0) {
                            createExplosion(j.x, j.y, j.color, 20);
                            updateScore(50);
                            jets.splice(i, 1);
                        }
                        break;
                    }
                }
                if (!jetHit && (j.x < -100 || j.x > width + 100)) jets.splice(i, 1);
            }

            // MISSILES UPDATE
            for (let i = missiles.length - 1; i >= 0; i--) {
                let m = missiles[i]; m.life--;
                
                const dxToPlayer = player.x - m.x; const dyToPlayer = player.y - m.y;
                const distToPlayer = Math.sqrt(dxToPlayer * dxToPlayer + dyToPlayer * dyToPlayer);
                
                m.vx += (dxToPlayer / distToPlayer) * 0.25; 
                m.vy += (dyToPlayer / distToPlayer) * 0.25;
                
                const currentSpeed = Math.sqrt(m.vx * m.vx + m.vy * m.vy);
                m.vx = (m.vx / currentSpeed) * m.speed; m.vy = (m.vy / currentSpeed) * m.speed;

                m.x += m.vx; m.y += m.vy;

                if (frameCount % 3 === 0) particles.push({ x: m.x, y: m.y, vx: 0, vy: 0, size: 2, color: m.color, life: 0.5, decay: 0.05 });

                let missileDestroyed = false;
                for (let k = bullets.length - 1; k >= 0; k--) {
                    let b = bullets[k];
                    if (getDist(b, m) < m.size + b.size) {
                        createExplosion(m.x, m.y, m.color, 15); 
                        if (!b.isBlackHole) bullets.splice(k, 1);
                        missiles.splice(i, 1);
                        missileDestroyed = true;
                        break;
                    }
                }
                if (missileDestroyed) continue;

                if (m.life <= 0) { createExplosion(m.x, m.y, m.color, 15); missiles.splice(i, 1); continue; }

                if (distToPlayer < player.size + m.size) {
                    createExplosion(m.x, m.y, m.color, 20); 
                    missiles.splice(i, 1);
                    handlePlayerHit();
                    continue;
                }
                if (m.y > height + 50 || m.x < -50 || m.x > width + 50 || m.y < -50) missiles.splice(i, 1);
            }

            // OBSTACLES UPDATE
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                
                // PURPLE BLACK HOLE PASSIVE GRAVITY PULL
                if (equippedSkin === 'purple') {
                    const dx = player.x - obs.x;
                    const dy = player.y - obs.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist > 0) {
                        obs.x += (dx / dist) * 0.8;
                        obs.y += (dy / dist) * 0.8;
                    }
                }
                
                obs.y += obs.speedY; obs.x += obs.speedX; obs.rotation += obs.rotationSpeed;

                if (getDist(player, obs) < player.size + (obs.size * 0.8)) {
                    handlePlayerHit();
                }

                if (obs.y > height + obs.size || obs.x < -obs.size || obs.x > width + obs.size) {
                    obstacles.splice(i, 1);
                }
            }

            // COLLECTIBLES UPDATE
            for (let i = collectibles.length - 1; i >= 0; i--) {
                let col = collectibles[i];
                col.y += col.speedY; col.pulse += 0.1;

                if (getDist(player, col) < player.size + col.size) {
                    updateScore(50);
                    createExplosion(col.x, col.y, col.color, 15);
                    collectibles.splice(i, 1);
                    continue;
                }
                if (col.y > height + col.size) collectibles.splice(i, 1);
            }
        }

        function draw() {
            if (glitch67Active) {
                ctx.fillStyle = `rgba(255, 0, 0, ${0.1 + Math.sin(frameCount * 0.1) * 0.05})`;
            } else {
                ctx.fillStyle = 'rgba(5, 5, 5, 0.3)';
            }
            ctx.fillRect(0, 0, width, height);
            
            ctx.save();
            if (screenShake > 0) {
                ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
                if (gameState === 'playing') screenShake *= 0.9;
                if (screenShake < 0.5) screenShake = 0;
            }

            ctx.globalCompositeOperation = 'lighter';

            // DRAW OTHER PLAYERS (GHOSTS)
            for (let id in otherPlayers) {
                let op = otherPlayers[id];
                ctx.save();
                ctx.translate(op.displayX, op.displayY);
                ctx.globalAlpha = 0.4; // Semi-transparent ghosts
                
                let opColor = '#0ff';
                let opSkin = skins.find(s => s.id === op.skin);
                if (opSkin) opColor = opSkin.color;
                
                ctx.shadowBlur = 10;
                ctx.shadowColor = opColor;
                ctx.fillStyle = opColor;
                
                ctx.beginPath();
                ctx.arc(0, 0, 15, 0, Math.PI * 2);
                ctx.fill();
                
                // Draw their score
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 12px Courier New';
                ctx.textAlign = 'center';
                ctx.shadowBlur = 0;
                ctx.fillText(op.score, 0, -25);
                ctx.restore();
            }

            // DRAW TIER 5 LASER
            if (shipTier >= 5 && equippedSkin !== 'alien' && equippedSkin !== 'purple' && (gameState === 'playing' || gameState === 'cutscene')) {
                ctx.save();
                ctx.fillStyle = player.color;
                ctx.globalAlpha = 0.5 + Math.random() * 0.5;
                ctx.shadowBlur = 30;
                ctx.shadowColor = player.color;
                ctx.fillRect(player.x - 15, 0, 30, player.y);
                ctx.fillStyle = '#fff';
                ctx.globalAlpha = 0.9;
                ctx.shadowBlur = 10;
                ctx.fillRect(player.x - 5, 0, 10, player.y);
                ctx.restore();
            }

            if (gameState === 'playing' || gameState === 'cutscene') {
                if (cutsceneType !== 'secret_unlock') {
                    ctx.save();
                    ctx.translate(player.x, player.y);
                    
                    if (magentaShieldActive) {
                        ctx.beginPath();
                        ctx.arc(0, 0, player.size + 15 + Math.sin(frameCount * 0.1) * 5, 0, Math.PI * 2);
                        ctx.strokeStyle = '#f0f'; ctx.lineWidth = 3; ctx.shadowBlur = 15; ctx.shadowColor = '#f0f';
                        ctx.stroke(); ctx.fillStyle = 'rgba(255, 0, 255, 0.1)'; ctx.fill();
                    }

                    if (equippedSkin === 'alien' && alienShields > 0) {
                        for(let i = 0; i < alienShields; i++) {
                            const angle = (frameCount * 0.05) + (i * (Math.PI * 2 / alienShields));
                            const orbitRadius = player.size + 20;
                            const sx = Math.cos(angle) * orbitRadius;
                            const sy = Math.sin(angle) * orbitRadius;
                            
                            ctx.fillStyle = '#7fff00'; ctx.shadowBlur = 15; ctx.shadowColor = '#7fff00';
                            ctx.beginPath(); ctx.arc(sx, sy, 6, 0, Math.PI * 2); ctx.fill();
                        }
                    }

                    if (postUpgradeInvincTimer > 0) {
                        ctx.beginPath(); ctx.arc(0, 0, player.size + 25, 0, Math.PI * 2);
                        ctx.strokeStyle = `rgba(0, 255, 255, ${Math.sin(frameCount * 0.2) * 0.5 + 0.5})`; 
                        ctx.lineWidth = 4; ctx.shadowBlur = 10; ctx.shadowColor = '#0ff'; ctx.stroke();
                    }

                    if (glitch67Active) {
                        ctx.shadowColor = '#ff3300';
                        if (frameCount % 4 < 2) ctx.translate((Math.random()-0.5)*5, (Math.random()-0.5)*5);
                    } else if (koalaNapActive) {
                        ctx.shadowColor = '#a9a9a9';
                    } else {
                        ctx.shadowColor = player.color;
                    }

                    ctx.fillStyle = player.color; ctx.strokeStyle = player.color; ctx.lineWidth = 2; ctx.shadowBlur = 20; ctx.beginPath();
                    
                    if (shipTier === 0 || equippedSkin === 'alien') {
                        ctx.arc(0, 0, player.size, 0, Math.PI * 2);
                    } else if (shipTier === 1) {
                        ctx.arc(0, 0, player.size, 0, Math.PI * 2);
                        ctx.moveTo(-player.size, 0); ctx.lineTo(-player.size * 2.5, player.size * 1.5); ctx.lineTo(-player.size * 0.5, -player.size * 0.8);
                        ctx.moveTo(player.size, 0); ctx.lineTo(player.size * 2.5, player.size * 1.5); ctx.lineTo(player.size * 0.5, -player.size * 0.8);
                    } else if (shipTier === 2) {
                        ctx.arc(0, 0, player.size, 0, Math.PI * 2);
                        ctx.moveTo(-player.size, 0); ctx.lineTo(-player.size * 3, player.size * 2); ctx.lineTo(-player.size * 0.8, -player.size * 1.2);
                        ctx.moveTo(player.size, 0); ctx.lineTo(player.size * 3, player.size * 2); ctx.lineTo(player.size * 0.8, -player.size * 1.2);
                        ctx.moveTo(-player.size*1.5, player.size); ctx.lineTo(-player.size*2, -player.size*0.5);
                        ctx.moveTo(player.size*1.5, player.size); ctx.lineTo(player.size*2, -player.size*0.5);
                    } else if (shipTier === 3) {
                        ctx.arc(0, 0, player.size, 0, Math.PI * 2);
                        ctx.moveTo(-player.size, 0); ctx.lineTo(-player.size * 3, player.size * 2); ctx.lineTo(-player.size * 0.8, -player.size * 1.2);
                        ctx.moveTo(player.size, 0); ctx.lineTo(player.size * 3, player.size * 2); ctx.lineTo(player.size * 0.8, -player.size * 1.2);
                        ctx.moveTo(-player.size*1.5, player.size); ctx.lineTo(-player.size*2, -player.size*0.5);
                        ctx.moveTo(player.size*1.5, player.size); ctx.lineTo(player.size*2, -player.size*0.5);
                        ctx.moveTo(player.size * 2.5, 0); ctx.arc(0, 0, player.size * 2.5, 0, Math.PI * 2); ctx.stroke();
                    } else {
                        for (let i = 0; i < 8; i++) {
                            ctx.rotate(Math.PI / 4);
                            ctx.moveTo(0, 0); ctx.lineTo(0, -player.size * 2.5); ctx.lineTo(player.size, -player.size);
                        }
                    }
                    ctx.fill();
                    
                    ctx.fillStyle = '#fff'; ctx.shadowBlur = 0; ctx.beginPath();
                    ctx.arc(0, 0, player.size * 0.4, 0, Math.PI * 2); ctx.fill();
                    
                    if (koalaNapActive) {
                        ctx.fillStyle = '#fff';
                        ctx.textAlign = 'left';
                        ctx.textBaseline = 'bottom';
                        ctx.font = 'bold 16px Courier New';
                        ctx.fillText('Zzz', 10 + Math.sin(frameCount*0.1)*5, -15 - Math.cos(frameCount*0.1)*5);
                    }

                    ctx.restore();
                }
            }

            bullets.forEach(b => {
                ctx.save();
                ctx.fillStyle = b.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = b.color;
                if (b.text) {
                    ctx.font = 'bold ' + (b.size * 3) + 'px Courier New';
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText(b.text, b.x, b.y);
                } else if (b.isBlackHole) {
                    ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2); 
                    ctx.fillStyle = '#000'; ctx.fill();
                    ctx.lineWidth = 3; ctx.strokeStyle = '#8a2be2'; ctx.stroke();
                    ctx.shadowBlur = 20; ctx.beginPath(); ctx.arc(b.x, b.y, b.size + Math.sin(frameCount * 0.2)*5, 0, Math.PI * 2); ctx.stroke();
                    
                    // Inner swirl
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.beginPath();
                    ctx.arc(b.x, b.y, b.size * 0.5, frameCount * 0.1, frameCount * 0.1 + Math.PI); ctx.stroke();
                } else {
                    ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2); ctx.fill();
                }
                ctx.restore();
            });

            if (boss.active) {
                ctx.save();
                ctx.translate(boss.x, boss.y);
                if (bossDisabledTimer > 0 && frameCount % 2 === 0) ctx.translate((Math.random()-0.5)*10, (Math.random()-0.5)*10);

                ctx.fillStyle = bossDisabledTimer > 0 ? '#555' : boss.color;
                ctx.shadowBlur = bossDisabledTimer > 0 ? 0 : 30; 
                ctx.shadowColor = boss.color;
                ctx.beginPath();
                ctx.moveTo(0, -boss.size); ctx.lineTo(boss.size, 0); ctx.lineTo(0, boss.size); ctx.lineTo(-boss.size, 0);
                ctx.closePath(); ctx.fill();
                
                ctx.fillStyle = '#fff'; ctx.shadowBlur = 0; ctx.beginPath();
                ctx.moveTo(0, -boss.size * 0.5); ctx.lineTo(boss.size * 0.5, 0); ctx.lineTo(0, boss.size * 0.5); ctx.lineTo(-boss.size * 0.5, 0);
                ctx.closePath(); ctx.fill();
                
                if (bossDisabledTimer > 0) {
                    ctx.strokeStyle = '#0ff'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(-boss.size, -boss.size); ctx.lineTo(boss.size, boss.size); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(boss.size, -boss.size); ctx.lineTo(-boss.size, boss.size); ctx.stroke();
                }

                if (boss.state === 'fighting') {
                    ctx.fillStyle = '#f00'; ctx.fillRect(-boss.size, -boss.size - 20, boss.size * 2, 8);
                    ctx.fillStyle = '#0f0'; const hpPercent = Math.max(0, boss.health / boss.maxHealth);
                    ctx.fillRect(-boss.size, -boss.size - 20, (boss.size * 2) * hpPercent, 8);
                }
                ctx.restore();
            }

            jets.forEach(j => {
                ctx.save(); ctx.translate(j.x, j.y);
                if (j.speedX < 0) ctx.scale(-1, 1);
                ctx.fillStyle = j.color; ctx.shadowBlur = 15; ctx.shadowColor = j.color;
                ctx.beginPath(); ctx.moveTo(j.size, 0); ctx.lineTo(-j.size, j.size * 0.6); ctx.lineTo(-j.size * 0.4, 0); ctx.lineTo(-j.size, -j.size * 0.6);
                ctx.closePath(); ctx.fill();
                ctx.fillStyle = '#0ff'; ctx.beginPath(); ctx.arc(-j.size * 0.8, 0, 4, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            });

            missiles.forEach(m => {
                ctx.save(); ctx.translate(m.x, m.y); ctx.rotate(Math.atan2(m.vy, m.vx));
                ctx.fillStyle = m.color; ctx.shadowBlur = 10; ctx.shadowColor = m.color;
                ctx.fillRect(-m.size * 2, -m.size/2, m.size * 4, m.size);
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(m.size * 2, 0, m.size/2, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            });

            collectibles.forEach(col => {
                ctx.save(); ctx.translate(col.x, col.y);
                const currentSize = col.size + Math.sin(col.pulse) * 3;
                ctx.fillStyle = col.color; ctx.shadowBlur = 15; ctx.shadowColor = col.color;
                ctx.beginPath(); ctx.moveTo(0, -currentSize); ctx.lineTo(currentSize, 0); ctx.lineTo(0, currentSize); ctx.lineTo(-currentSize, 0);
                ctx.closePath(); ctx.fill();
                ctx.restore();
            });

            obstacles.forEach(obs => {
                ctx.save(); ctx.translate(obs.x, obs.y); ctx.rotate(obs.rotation);
                ctx.strokeStyle = obs.color; ctx.lineWidth = 3; ctx.shadowBlur = 15; ctx.shadowColor = obs.color;
                ctx.strokeRect(-obs.size/2, -obs.size/2, obs.size, obs.size);
                ctx.fillStyle = 'rgba(255, 0, 0, 0.2)'; ctx.fillRect(-obs.size/2, -obs.size/2, obs.size, obs.size);
                ctx.restore();
            });

            particles.forEach(p => {
                ctx.save(); ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.color;
                ctx.shadowBlur = 10; ctx.shadowColor = p.color; ctx.fillRect(p.x, p.y, p.size, p.size);
                ctx.restore();
            });

            ctx.globalCompositeOperation = 'source-over';

            if (gameState === 'cutscene' && cutsceneType === 'upgrade') {
                ctx.save(); ctx.translate(width / 2, mothershipY);
                if (cutsceneTimer <= 180 && cutsceneTimer > 120) {
                    ctx.fillStyle = `rgba(0, 255, 255, ${Math.random() * 0.6 + 0.2})`; ctx.beginPath();
                    ctx.moveTo(-40, 40); ctx.lineTo(40, 40); ctx.lineTo(player.x - width / 2 + player.size * 2, player.y - mothershipY);
                    ctx.lineTo(player.x - width / 2 - player.size * 2, player.y - mothershipY); ctx.closePath(); ctx.fill();
                }
                ctx.fillStyle = '#050515'; ctx.strokeStyle = '#0ff'; ctx.lineWidth = 4; ctx.shadowBlur = 30; ctx.shadowColor = '#0ff';
                ctx.beginPath(); ctx.moveTo(-200, -80); ctx.lineTo(200, -80); ctx.lineTo(250, 0); ctx.lineTo(150, 60);
                ctx.lineTo(-150, 60); ctx.lineTo(-250, 0); ctx.closePath(); ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#fff'; ctx.shadowBlur = 50; ctx.beginPath(); ctx.arc(0, 20, 30, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }

            if (upgradeFlashAlpha > 0) {
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, Math.min(1, upgradeFlashAlpha))})`;
                ctx.fillRect(0, 0, width, height);
            }

            if (gameState === 'cutscene' && cutsceneText) {
                let textColor = '#0ff';
                if (cutsceneType === 'skin_unlock' && recentUnlock) textColor = recentUnlock.color;
                if (cutsceneType === 'magenta_block') textColor = '#f0f';
                if (cutsceneType === 'lime_decay') textColor = '#0f0';
                if (cutsceneType === 'void_shot') textColor = '#8a2be2';
                if (cutsceneType === 'solar_power') textColor = '#ffd700';
                if (cutsceneType === 'blood_revive') textColor = '#ff0044';
                if (cutsceneType === 'alien_shield') textColor = '#7fff00';
                if (cutsceneType === 'koala_unlock' || cutsceneType === 'koala_nap' || cutsceneType === 'koala_wake') textColor = '#a9a9a9';
                if (cutsceneType === 'secret_unlock' || cutsceneType === 'glitch_start') textColor = Math.random() > 0.5 ? '#ff3300' : '#fff'; 
                
                ctx.fillStyle = textColor;
                ctx.font = 'bold 40px Courier New';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowBlur = 20;
                ctx.shadowColor = textColor;
                
                let alpha = 1;
                if (cutsceneTimer > 100 && (cutsceneType === 'boss_defeat' || cutsceneType === 'skin_unlock' || cutsceneType === 'glitch_success')) alpha = (120 - cutsceneTimer) / 20;
                if (cutsceneTimer < 30) alpha = cutsceneTimer / 30;
                
                let xOffset = 0; let yOffset = 0;
                if (cutsceneType === 'secret_unlock' || cutsceneType === 'glitch_start') {
                    xOffset = (Math.random() - 0.5) * 15;
                    yOffset = (Math.random() - 0.5) * 15;
                    alpha = Math.random() * 0.5 + 0.5;
                }
                
                ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
                ctx.fillText(cutsceneText, width / 2 + xOffset, height / 3 + yOffset);
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
            }

            ctx.restore();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        gameLoop(); 
    </script>
</body>
</html>
