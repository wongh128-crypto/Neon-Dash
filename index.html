<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Dash</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            touch-action: none; /* Prevent scroll on touch devices */
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .hidden {
            display: none !important;
        }

        #score-display {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #0ff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #0ff;
        }

        .screen {
            background: rgba(5, 5, 5, 0.85);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #0ff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            text-align: center;
            pointer-events: auto;
        }

        h1 {
            color: #fff;
            font-size: 48px;
            margin: 0 0 20px 0;
            text-shadow: 0 0 15px #f0f, 0 0 30px #f0f;
            letter-spacing: 4px;
        }

        p {
            color: #ccc;
            font-size: 18px;
            margin-bottom: 30px;
        }

        button {
            background: transparent;
            color: #0ff;
            border: 2px solid #0ff;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3) inset;
        }

        button:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 20px #0ff;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div id="score-display">SCORE: <span id="scoreValue">0</span></div>

    <div id="ui-layer">
        <!-- Start Screen -->
        <div id="startScreen" class="screen">
            <h1 style="color: #0ff; text-shadow: 0 0 15px #0ff;">NEON DASH</h1>
            <p>Drag or use your mouse to move.<br>Dodge the RED obstacles.<br>Collect GREEN gems for bonus points.</p>
            <button id="startBtn">Play Now</button>
        </div>

        <!-- Game Over Screen -->
        <div id="gameOverScreen" class="screen hidden">
            <h1 style="color: #f00; text-shadow: 0 0 15px #f00;">SYSTEM FAILURE</h1>
            <p>Final Score: <span id="finalScore" style="color:#0ff; font-weight:bold; font-size: 24px;">0</span></p>
            <button id="restartBtn">Reboot System</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const scoreValue = document.getElementById('scoreValue');
        const finalScore = document.getElementById('finalScore');
        
        let width, height;
        let gameState = 'start'; // start, playing, gameover
        let score = 0;
        let frameCount = 0;
        let difficultyMultiplier = 1;

        // Entities
        let player = { x: 0, y: 0, targetX: 0, targetY: 0, size: 15, color: '#0ff' };
        let obstacles = [];
        let collectibles = [];
        let particles = [];
        let jets = [];
        let missiles = [];

        // --- Boss & Combat Variables ---
        let nextBossScore = 300; 
        let bossLevel = 1;
        let boss = { active: false, x: 0, y: -100, size: 50, health: 0, maxHealth: 0, speedX: 0, color: '#f0f', state: 'hidden', fireTimer: 0, jetTimer: 0 };
        let bullets = []; 
        let bulletTimer = 0;

        // Setup Canvas
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            if (gameState === 'start') {
                player.x = width / 2;
                player.y = height / 1.5;
                player.targetX = player.x;
                player.targetY = player.y;
            }
        }
        window.addEventListener('resize', resize);
        resize();

        // Input Handling
        function updateTarget(e) {
            if (gameState !== 'playing') return;
            
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            player.targetX = clientX;
            player.targetY = clientY;
        }

        window.addEventListener('mousemove', updateTarget);
        window.addEventListener('touchmove', updateTarget, {passive: false});
        
        // Prevent default touch behavior (scrolling)
        document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        function startGame() {
            gameState = 'playing';
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            score = 0;
            frameCount = 0;
            difficultyMultiplier = 1;
            obstacles = [];
            collectibles = [];
            particles = [];
            bullets = [];
            jets = [];
            missiles = [];
            
            nextBossScore = 300;
            bossLevel = 1;
            boss.active = false;
            boss.state = 'hidden';
            
            player.x = width / 2;
            player.y = height / 1.5;
            player.targetX = player.x;
            player.targetY = player.y;
            
            updateScore(0);
            gameLoop();
        }

        function gameOver() {
            gameState = 'gameover';
            gameOverScreen.classList.remove('hidden');
            finalScore.innerText = Math.floor(score);
            createExplosion(player.x, player.y, '#0ff', 40); // Player explosion
        }

        function updateScore(points) {
            score += points;
            scoreValue.innerText = Math.floor(score);
        }

        // --- Entity Creation ---
        function spawnObstacle() {
            const size = Math.random() * 20 + 15;
            obstacles.push({
                x: Math.random() * width,
                y: -size,
                size: size,
                speedY: (Math.random() * 3 + 2) * difficultyMultiplier,
                speedX: (Math.random() - 0.5) * 2,
                color: '#f00',
                rotation: 0,
                rotationSpeed: (Math.random() - 0.5) * 0.2
            });
        }

        function spawnCollectible() {
            collectibles.push({
                x: Math.random() * (width - 40) + 20,
                y: -20,
                size: 12,
                speedY: (Math.random() * 2 + 1) * difficultyMultiplier,
                color: '#0f0',
                pulse: 0
            });
        }

        function spawnBullet() {
            bullets.push({
                x: player.x,
                y: player.y - player.size,
                size: 5,
                speedY: -12,
                color: '#ff0'
            });
        }

        function spawnBossProjectile() {
            const dx = player.x - boss.x;
            const dy = player.y - boss.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const speed = 4 + bossLevel;
            
            obstacles.push({
                x: boss.x,
                y: boss.y,
                size: 15,
                speedY: (dy / dist) * speed,
                speedX: (dx / dist) * speed,
                color: '#f0f', // Magenta to distinguish from normal red obstacles
                rotation: 0,
                rotationSpeed: 0.2
            });
        }

        function spawnJet() {
            const side = Math.random() > 0.5 ? 1 : -1;
            jets.push({
                x: side === 1 ? -20 : width + 20,
                y: boss.y + (Math.random() * 80 + 40),
                size: 18,
                speedX: side === 1 ? 3 + (bossLevel * 0.5) : -3 - (bossLevel * 0.5),
                health: 30 + (bossLevel * 10),
                color: '#f80', // Orange neon
                fireTimer: Math.random() * 40
            });
        }

        function spawnMissile(sourceX, sourceY) {
            missiles.push({
                x: sourceX,
                y: sourceY,
                size: 4,
                vx: 0,
                vy: 4,
                speed: 4 + (bossLevel * 0.5),
                color: '#f40' // Red-orange
            });
        }

        function createExplosion(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: Math.random() * 4 + 2,
                    color: color,
                    life: 1.0,
                    decay: Math.random() * 0.02 + 0.015
                });
            }
        }

        // --- Main Game Logic ---
        function update() {
            frameCount++;
            
            // Difficulty scaling
            difficultyMultiplier = 1 + (frameCount / 2000);

            // Smooth player movement (interpolation)
            const ease = 0.15;
            player.x += (player.targetX - player.x) * ease;
            player.y += (player.targetY - player.y) * ease;

            // Keep player in bounds
            player.x = Math.max(player.size, Math.min(width - player.size, player.x));
            player.y = Math.max(player.size, Math.min(height - player.size, player.y));

            // Spawning
            let spawnRate = Math.max(10, Math.floor(40 - (difficultyMultiplier * 5)));
            
            if (!boss.active) {
                if (frameCount % spawnRate === 0) spawnObstacle();
                if (frameCount % 150 === 0) spawnCollectible();
                
                // Trigger Boss
                if (score >= nextBossScore) {
                    boss.active = true;
                    boss.state = 'entering';
                    boss.x = width / 2;
                    boss.y = -100;
                    boss.maxHealth = 400 * bossLevel; // Increased from 200
                    boss.health = boss.maxHealth;
                    boss.speedX = 5 + bossLevel;      // Increased from 3
                    boss.fireTimer = 0;
                    boss.jetTimer = 0;                // New jet timer
                }
            } else {
                // Boss Logic
                if (boss.state === 'entering') {
                    boss.y += 2;
                    if (boss.y >= 100) boss.state = 'fighting';
                } else if (boss.state === 'fighting') {
                    // Movement
                    boss.x += boss.speedX;
                    if (boss.x <= boss.size || boss.x >= width - boss.size) {
                        boss.speedX *= -1;
                    }
                    
                    // Firing
                    boss.fireTimer++;
                    let bossFireRate = Math.max(10, 40 - (bossLevel * 5)); // Shoots faster
                    if (boss.fireTimer >= bossFireRate) {
                        spawnBossProjectile();
                        boss.fireTimer = 0;
                    }

                    // Summon Jets
                    boss.jetTimer++;
                    let jetSpawnRate = Math.max(60, 150 - (bossLevel * 10));
                    if (boss.jetTimer >= jetSpawnRate) {
                        spawnJet();
                        boss.jetTimer = 0;
                    }
                }
                
                // Player Auto-fire during boss fight
                bulletTimer++;
                if (bulletTimer >= 8) {
                    spawnBullet();
                    bulletTimer = 0;
                }
            }

            // Passive score
            if (!boss.active && frameCount % 10 === 0) updateScore(1 * difficultyMultiplier);

            // Update Bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.y += b.speedY;
                
                // Boss collision
                if (boss.active && boss.state !== 'entering') {
                    const dx = b.x - boss.x;
                    const dy = b.y - boss.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    // Diamond collision approximation (using circle for simplicity)
                    if (dist < boss.size * 0.8) {
                        boss.health -= 10;
                        createExplosion(b.x, b.y, b.color, 3);
                        bullets.splice(i, 1);
                        
                        // Boss defeat
                        if (boss.health <= 0) {
                            createExplosion(boss.x, boss.y, boss.color, 100);
                            boss.active = false;
                            updateScore(500 * bossLevel);
                            nextBossScore = score + 500 * bossLevel + 300;
                            bossLevel++;
                        }
                        continue;
                    }
                }
                
                if (b.y < -10) bullets.splice(i, 1);
            }

            // Update Jets
            for (let i = jets.length - 1; i >= 0; i--) {
                let j = jets[i];
                j.x += j.speedX;
                
                // Hover effect
                j.y += Math.sin(frameCount * 0.05) * 1.5;

                // Jet shooting
                j.fireTimer++;
                if (j.fireTimer > 80) {
                    spawnMissile(j.x, j.y);
                    j.fireTimer = 0;
                }

                // Bullet collision with Jets
                let jetHit = false;
                for (let k = bullets.length - 1; k >= 0; k--) {
                    let b = bullets[k];
                    const dx = b.x - j.x;
                    const dy = b.y - j.y;
                    if (Math.sqrt(dx * dx + dy * dy) < j.size + b.size) {
                        j.health -= 10;
                        createExplosion(b.x, b.y, '#ff0', 3);
                        bullets.splice(k, 1);
                        jetHit = true;
                        if (j.health <= 0) {
                            createExplosion(j.x, j.y, j.color, 20);
                            updateScore(50);
                            jets.splice(i, 1);
                        }
                        break;
                    }
                }
                
                if (!jetHit && (j.x < -100 || j.x > width + 100)) {
                    jets.splice(i, 1);
                }
            }

            // Update Missiles
            for (let i = missiles.length - 1; i >= 0; i--) {
                let m = missiles[i];
                
                // Homing logic towards player
                const dxToPlayer = player.x - m.x;
                const dyToPlayer = player.y - m.y;
                const distToPlayer = Math.sqrt(dxToPlayer * dxToPlayer + dyToPlayer * dyToPlayer);
                
                m.vx += (dxToPlayer / distToPlayer) * 0.25; // Homing strength
                m.vy += (dyToPlayer / distToPlayer) * 0.25;
                
                // Cap speed
                const currentSpeed = Math.sqrt(m.vx * m.vx + m.vy * m.vy);
                m.vx = (m.vx / currentSpeed) * m.speed;
                m.vy = (m.vy / currentSpeed) * m.speed;

                m.x += m.vx;
                m.y += m.vy;

                // Add trail particles
                if (frameCount % 3 === 0) {
                    particles.push({
                        x: m.x, y: m.y,
                        vx: 0, vy: 0,
                        size: 2, color: m.color,
                        life: 0.5, decay: 0.05
                    });
                }

                // Collision with player
                if (distToPlayer < player.size + m.size) {
                    gameOver();
                }

                // Remove if off screen
                if (m.y > height + 50 || m.x < -50 || m.x > width + 50 || m.y < -50) {
                    missiles.splice(i, 1);
                }
            }

            // Update Obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.y += obs.speedY;
                obs.x += obs.speedX;
                obs.rotation += obs.rotationSpeed;

                // Collision with player (Circle collision approximation)
                const dx = player.x - obs.x;
                const dy = player.y - obs.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < player.size + (obs.size * 0.8)) {
                    gameOver();
                }

                if (obs.y > height + obs.size || obs.x < -obs.size || obs.x > width + obs.size) {
                    obstacles.splice(i, 1);
                }
            }

            // Update Collectibles
            for (let i = collectibles.length - 1; i >= 0; i--) {
                let col = collectibles[i];
                col.y += col.speedY;
                col.pulse += 0.1;

                const dx = player.x - col.x;
                const dy = player.y - col.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < player.size + col.size) {
                    updateScore(50);
                    createExplosion(col.x, col.y, col.color, 15);
                    collectibles.splice(i, 1);
                    continue;
                }

                if (col.y > height + col.size) {
                    collectibles.splice(i, 1);
                }
            }

            // Update Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= p.decay;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        function draw() {
            // Motion blur effect instead of clearRect
            ctx.fillStyle = 'rgba(5, 5, 5, 0.3)';
            ctx.fillRect(0, 0, width, height);
            
            // Set glowing blend mode
            ctx.globalCompositeOperation = 'lighter';

            if (gameState === 'playing') {
                // Draw Player
                ctx.save();
                ctx.translate(player.x, player.y);
                ctx.fillStyle = player.color;
                ctx.shadowBlur = 20;
                ctx.shadowColor = player.color;
                ctx.beginPath();
                ctx.arc(0, 0, player.size, 0, Math.PI * 2);
                ctx.fill();
                
                // Player core
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(0, 0, player.size * 0.4, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            // Draw Bullets
            bullets.forEach(b => {
                ctx.save();
                ctx.fillStyle = b.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = b.color;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });

            // Draw Boss
            if (boss.active) {
                ctx.save();
                ctx.translate(boss.x, boss.y);
                
                // Boss Body (Diamond)
                ctx.fillStyle = boss.color;
                ctx.shadowBlur = 30;
                ctx.shadowColor = boss.color;
                ctx.beginPath();
                ctx.moveTo(0, -boss.size);
                ctx.lineTo(boss.size, 0);
                ctx.lineTo(0, boss.size);
                ctx.lineTo(-boss.size, 0);
                ctx.closePath();
                ctx.fill();
                
                // Core
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.moveTo(0, -boss.size * 0.5);
                ctx.lineTo(boss.size * 0.5, 0);
                ctx.lineTo(0, boss.size * 0.5);
                ctx.lineTo(-boss.size * 0.5, 0);
                ctx.closePath();
                ctx.fill();
                
                // Health Bar
                if (boss.state === 'fighting') {
                    ctx.fillStyle = '#f00';
                    ctx.fillRect(-boss.size, -boss.size - 20, boss.size * 2, 8);
                    ctx.fillStyle = '#0f0';
                    const hpPercent = Math.max(0, boss.health / boss.maxHealth);
                    ctx.fillRect(-boss.size, -boss.size - 20, (boss.size * 2) * hpPercent, 8);
                }
                
                ctx.restore();
            }

            // Draw Jets
            jets.forEach(j => {
                ctx.save();
                ctx.translate(j.x, j.y);
                
                // Point in direction of movement
                if (j.speedX < 0) ctx.scale(-1, 1);
                
                ctx.fillStyle = j.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = j.color;
                
                // Draw neon jet shape (triangle/arrow)
                ctx.beginPath();
                ctx.moveTo(j.size, 0);
                ctx.lineTo(-j.size, j.size * 0.6);
                ctx.lineTo(-j.size * 0.4, 0);
                ctx.lineTo(-j.size, -j.size * 0.6);
                ctx.closePath();
                ctx.fill();
                
                // Jet engine glow
                ctx.fillStyle = '#0ff';
                ctx.beginPath();
                ctx.arc(-j.size * 0.8, 0, 4, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            });

            // Draw Missiles
            missiles.forEach(m => {
                ctx.save();
                ctx.translate(m.x, m.y);
                // Rotate towards movement direction
                ctx.rotate(Math.atan2(m.vy, m.vx));
                
                ctx.fillStyle = m.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = m.color;
                
                // Missile body
                ctx.fillRect(-m.size * 2, -m.size/2, m.size * 4, m.size);
                // Warhead
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(m.size * 2, 0, m.size/2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            });

            // Draw Collectibles
            collectibles.forEach(col => {
                ctx.save();
                ctx.translate(col.x, col.y);
                const currentSize = col.size + Math.sin(col.pulse) * 3;
                
                ctx.fillStyle = col.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = col.color;
                
                ctx.beginPath();
                ctx.moveTo(0, -currentSize);
                ctx.lineTo(currentSize, 0);
                ctx.lineTo(0, currentSize);
                ctx.lineTo(-currentSize, 0);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            });

            // Draw Obstacles
            obstacles.forEach(obs => {
                ctx.save();
                ctx.translate(obs.x, obs.y);
                ctx.rotate(obs.rotation);
                
                ctx.strokeStyle = obs.color;
                ctx.lineWidth = 3;
                ctx.shadowBlur = 15;
                ctx.shadowColor = obs.color;
                
                ctx.strokeRect(-obs.size/2, -obs.size/2, obs.size, obs.size);
                
                // Inner faint core
                ctx.fillStyle = 'rgba(255, 0, 0, 0.2)';
                ctx.fillRect(-obs.size/2, -obs.size/2, obs.size, obs.size);
                
                ctx.restore();
            });

            // Draw Particles
            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                ctx.restore();
            });

            // Reset blend mode
            ctx.globalCompositeOperation = 'source-over';
        }

        function gameLoop() {
            if (gameState === 'playing') {
                update();
            }
            draw();
            
            if (gameState === 'playing' || particles.length > 0) {
                requestAnimationFrame(gameLoop);
            }
        }
        
        // Initial drawing to setup the screen
        draw();
    </script>
</body>
</html>
